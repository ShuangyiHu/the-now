# .github/workflows/affirmation.yml
#
# Sends a personalized affirmation via Pushover every 30 minutes
# between 9 AM and 9 PM PST/PDT (America/Los_Angeles).
#
# Triggered externally by cron-job.org via the workflow_dispatch event.
# cron-job.org POSTs to:
#   https://api.github.com/repos/ShuangyiHu/the-now/dispatches
# with body: {"event_type": "affirmation"}
#
# The Python script handles all time-window logic internally:
#   - 9 AM  - 1 PM  → morning affirmation
#   - 1 PM  - 7 PM  → afternoon affirmation
#   - 7 PM  - 9 PM  → evening affirmation
#   - outside window → exits cleanly with no notification sent
#
# After each run, sent_log.txt is committed back to the repo
# so future runs can avoid repeating content.
#
# REQUIRED REPOSITORY SECRETS (Settings → Secrets → Actions):
#   OPENAI_API_KEY   — OpenAI API key
#   PUSHOVER_TOKEN   — Pushover application token
#   PUSHOVER_USER    — Pushover user/group key

name: Daily Affirmations (PST 9AM-9PM)

on:
  workflow_dispatch:
    # Triggered by cron-job.org every 30 minutes, 9AM-9PM PST
    # No inputs needed — the Python script determines the time period internally

jobs:
  send-affirmation:
    runs-on: ubuntu-latest

    # Required so the workflow can commit the updated log back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Check out the repository ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Cache pip dependencies ─────────────────────────────────────────
      # Cache key includes the hash of requirements.txt so the cache is
      # automatically invalidated when dependencies change.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Run the affirmation agent ──────────────────────────────────────
      # Secrets are passed as environment variables and never appear in logs.
      - name: Send affirmation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          LANGCHAIN_TRACING: "true"
          LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT: ${{ secrets.LANGCHAIN_PROJECT }}
        run: python affirmation_agent.py

      # ── 6. Commit the updated log back to the repository ─────────────────
      # Uses git status instead of git diff to correctly handle both:
      #   - first run (sent_log.txt is a new untracked file)
      #   - subsequent runs (sent_log.txt is a modified tracked file)
      # Only commits when the file actually changed.
      - name: Commit updated sent_log.txt
        run: |
          git config user.name  "affirmation-bot"
          git config user.email "affirmation-bot@users.noreply.github.com"

          if [ -z "$(git status --porcelain sent_log.txt)" ]; then
            echo "sent_log.txt unchanged — nothing to commit."
          else
            git add sent_log.txt
            git commit -m "chore: log affirmation [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
